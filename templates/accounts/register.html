{% extends "base_auth.html" %}
{% block title %}Create Account — Quest DNC{% endblock %}

{% block content %}
<h5 class="text-center mb-4 fw-semibold" style="color:#e6edf3;">Create your account</h5>

<form method="post" novalidate>
  {% csrf_token %}
  {% for field in form %}
  <div class="mb-3">
    <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
    {{ field }}
    {% if field.errors %}
      <div class="text-danger mt-1" style="font-size:0.8rem;">{{ field.errors.0 }}</div>
    {% endif %}
  </div>
  {% endfor %}
  <button type="submit" class="btn btn-primary w-100 fw-semibold">Create Account</button>
</form>

<div class="auth-footer mt-3">
  Already have an account? <a href="{% url 'accounts:login' %}">Sign in</a>
</div>
{% endblock %}
