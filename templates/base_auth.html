<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CheckDNC Checker{% endblock %}</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <style>
    body {
      background: #010409;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 2rem;
    }
    .auth-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1.75rem;
      text-decoration: none;
      color: #e6edf3;
      font-weight: 700;
      font-size: 1.2rem;
    }
    .auth-brand .brand-icon {
      width: 38px;
      height: 38px;
      background: #3b82f6;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }
    .form-control {
      background-color: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
    }
    .form-control:focus {
      background-color: #161b22;
      border-color: #3b82f6;
      color: #e6edf3;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .form-control::placeholder { color: #6e7681; }
    .form-label { font-size: 0.875rem; color: #8b949e; }
    .btn-primary { background-color: #3b82f6; border-color: #3b82f6; }
    .btn-primary:hover { background-color: #2563eb; border-color: #2563eb; }
    .divider { color: #6e7681; font-size: 0.8rem; }
    .auth-footer { font-size: 0.8rem; color: #6e7681; text-align: center; margin-top: 1rem; }
    .auth-footer a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="px-3 w-100">
    <div class="auth-card mx-auto">
      <a href="/" class="auth-brand">
        <div class="brand-icon"><i class="bi bi-shield-check text-white"></i></div>
        CheckDNC
      </a>
      {% block content %}{% endblock %}
    </div>
  </div>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmM+OgJlW/OAAS/sLkCCxFI5Q8q"
    crossorigin="anonymous"
  ></script>
</body>
</html>
