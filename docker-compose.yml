services:

  # ── PostgreSQL ───────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: quest_dnc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (broker + cache) ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django web process ───────────────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn quest_dnc.wsgi:application
               --bind 0.0.0.0:8000
               --workers 2
               --timeout 120
               --access-logfile -"
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/quest_dnc
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery worker ────────────────────────────────────────────────────
  worker:
    build: .
    restart: unless-stopped
    command: celery -A quest_dnc worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/quest_dnc
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery beat (periodic tasks) ─────────────────────────────────────
  beat:
    build: .
    restart: unless-stopped
    command: >
      celery -A quest_dnc beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/quest_dnc
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Nginx reverse proxy ──────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  media_data:
  static_data:
