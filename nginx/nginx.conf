upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Allow large file uploads (up to 210 MB)
    client_max_body_size 210m;

    # Static files — served directly by Nginx (fast, no Django involved)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files — served directly but not publicly listed
    location /media/ {
        alias /app/media/;
        # Restrict direct access; Django views control download links
        internal;
    }

    # Everything else → Gunicorn
    location / {
        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for large file uploads and slow scrub polls
        proxy_read_timeout    300s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    300s;
    }
}
